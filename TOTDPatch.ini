[Display]
; Window mode: windowed | borderless | fullscreen
Mode=borderless

; Target resolution (output window size).
; Common values:
;   1280x720   (720p)
;   1920x1080  (1080p / Full HD)
;   2560x1440  (1440p / QHD)
;   3840x2160  (4K / UHD)
Width=1920
Height=1080

; KeepAspect=1  -> letterbox/pillarbox to preserve the original 4:3 ratio
; KeepAspect=0  -> stretch to fill the window (may look distorted)
KeepAspect=1

; StretchToFit=1 overrides KeepAspect and fills the entire window regardless
StretchToFit=0

; PauseOnFocusLoss=1 -> suspend the game loop when alt-tabbed (saves CPU)
; PauseOnFocusLoss=0 -> game keeps running in the background
PauseOnFocusLoss=0

; MuteOnFocusLoss=1 -> mute game audio when alt-tabbed (independent of PauseOnFocusLoss)
; MuteOnFocusLoss=0 -> audio keeps playing in the background
MuteOnFocusLoss=0

[Controls]
; Remap game control keys. Format: OriginalKey=NewKey
; Supported names: A-Z, 0-9, F1-F12, ENTER, ESCAPE, SPACE, PAUSE,
;                  LEFT, RIGHT, UP, DOWN, TAB, BACKSPACE, DELETE,
;                  INSERT, HOME, END, PAGEUP, PAGEDOWN, NUMPAD0-9,
;                  or raw hex virtual key code e.g. 0x70
;
; Default game controls:
;   LEFT/RIGHT/UP/DOWN  - Menu navigation
;   ENTER               - Confirm / start game
;   ESCAPE              - Delete targeting / back
;   PAUSE               - Pause game
;   F1-F4               - Use items (Original Mode)
;   ALT+F2              - Return to Title Screen  (combos cannot be remapped)
;   ALT+F3              - Return to Menu Screen
;   ALT+F4              - Quit
;
; Examples — uncomment to activate:
;F1=1
;F2=2
;F3=3
;F4=4
;PAUSE=P
